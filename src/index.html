<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FontConverter</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <!-- Header / Input area -->
        <div class="header">
            <div class="header-bar">
                <span class="header-title">FontConverter</span>
                <div class="header-actions">
                    <button id="btn-settings" class="btn-icon" title="設定">⚙</button>
                    <button id="btn-close" class="btn-icon" title="閉じる (Esc)">✕</button>
                </div>
            </div>
            <div class="input-wrapper">
                <textarea id="input-text" placeholder="テキストを入力..." rows="2" spellcheck="false"></textarea>
            </div>
        </div>

        <!-- Font style grid -->
        <div id="font-grid" class="font-grid">
            <!-- Cards are generated by app.js -->
        </div>

        <!-- Status bar -->
        <div class="status-bar">
            <span class="status-hint">クリックでコピー＆貼り付け</span>
            <span class="status-shortcut">Ctrl+Shift+F</span>
        </div>

        <!-- Settings Panel Overlay -->
        <div id="settings-panel" class="settings-panel hidden">
            <div class="settings-header">
                <span class="settings-title">設定</span>
                <button id="btn-close-settings" class="btn-icon" title="閉じる">✕</button>
            </div>
            <div class="settings-body">
                <label class="setting-item">
                    <div class="setting-info">
                        <span class="setting-name">自動貼り付け</span>
                        <span class="setting-desc">変換後に自動でCtrl+Vを実行</span>
                    </div>
                    <div class="toggle-switch">
                        <input type="checkbox" id="setting-auto-paste">
                        <span class="toggle-slider"></span>
                    </div>
                </label>
                <label class="setting-item">
                    <div class="setting-info">
                        <span class="setting-name">クリップボードを保持</span>
                        <span class="setting-desc">変換前のクリップボード内容を復元</span>
                    </div>
                    <div class="toggle-switch">
                        <input type="checkbox" id="setting-preserve-clipboard">
                        <span class="toggle-slider"></span>
                    </div>
                </label>
            <label class="setting-item">
                    <div class="setting-info">
                        <span class="setting-name">Windows起動時に自動起動</span>
                        <span class="setting-desc">最小化状態でバックグラウンド起動</span>
                    </div>
                    <div class="toggle-switch">
                        <input type="checkbox" id="setting-auto-start">
                        <span class="toggle-slider"></span>
                    </div>
                </label>
                <label class="setting-item">
                    <div class="setting-info">
                        <span class="setting-name">コピー通知</span>
                        <span class="setting-desc">コピー成功時にカードをフラッシュ表示</span>
                    </div>
                    <div class="toggle-switch">
                        <input type="checkbox" id="setting-notification-on-copy">
                        <span class="toggle-slider"></span>
                    </div>
                </label>
                <label class="setting-item">
                    <div class="setting-info">
                        <span class="setting-name">コンパクトモード</span>
                        <span class="setting-desc">カードを小さく表示して一覧性を向上</span>
                    </div>
                    <div class="toggle-switch">
                        <input type="checkbox" id="setting-compact-mode">
                        <span class="toggle-slider"></span>
                    </div>
                </label>
            </div>
        </div>
    </div>

    <script src="unicode-maps.js"></script>
    <script src="app.js"></script>
</body>
</html>
